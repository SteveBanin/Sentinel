name: promote-overlay

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Immutable image tag to promote, e.g. sha-abc1234"
        required: true
      target_env:
        description: "Target environment"
        required: true
        type: choice
        options:
          - test
          - stage
          - prod

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest

    env:
      GITOPS_REPO: ${{ vars.GITOPS_REPO }}
      GITOPS_BRANCH: ${{ vars.GITOPS_BRANCH }}
      TARGET_ENV: ${{ github.event.inputs.target_env }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag }}

    steps:
      - name: Checkout sentinel-gitops repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: ${{ env.GITOPS_BRANCH }}
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: sentinel-gitops

      - name: Resolve target overlay
        id: overlay
        shell: bash
        run: |
          case "${TARGET_ENV}" in
            test)
              echo "file=${{ vars.GITOPS_TEST_OVERLAY }}" >> "$GITHUB_OUTPUT"
              ;;
            stage)
              echo "file=${{ vars.GITOPS_STAGE_OVERLAY }}" >> "$GITHUB_OUTPUT"
              ;;
            prod)
              echo "file=${{ vars.GITOPS_PROD_OVERLAY }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported target env: ${TARGET_ENV}"
              exit 1
              ;;
          esac

      - name: Update target overlay image tags
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          repo_root = Path.cwd()
          file_path = repo_root / "sentinel-gitops" / os.environ["OVERLAY_FILE"]
          image_tag = os.environ["IMAGE_TAG"]

          text = file_path.read_text()
          text = re.sub(r'(newTag:\s*)\S+', rf'\1{image_tag}', text, count=2)
          file_path.write_text(text)

          print(f"Updated {file_path} to {image_tag}")
          PY
        env:
          OVERLAY_FILE: ${{ steps.overlay.outputs.file }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Commit and push promotion change
        shell: bash
        run: |
          cd sentinel-gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.overlay.outputs.file }}"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Promote ${{ env.IMAGE_TAG }} to ${{ env.TARGET_ENV }}"
          git push origin "${GITOPS_BRANCH}"