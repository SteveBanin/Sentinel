server:
  port: 8081

sentinel:
  api:
    base-url: ${SENTINEL_API_BASE_URL:http://localhost:8080}
    timeout-ms: ${SENTINEL_API_TIMEOUT_MS:2000}
    retries: ${SENTINEL_API_RETRIES:3}
  worker:
    poll-interval-ms: ${SENTINEL_WORKER_POLL_INTERVAL_MS:10000}
    max-concurrency: ${SENTINEL_WORKER_MAX_CONCURRENCY:10}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sentinel}
    username: ${DB_USER:sentinel}
    password: ${DB_PASSWORD:sentinel}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true